<html>
    <head>
        <title>Intraday Trading App</title>
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/semantic-ui@2.4.2/dist/semantic.min.css"
        >
        <script
            src="https://cdn.jsdelivr.net/npm/semantic-ui@2.4.2/dist/semantic.min.js"
        ></script>
    </head>

    <body>

<div class="ui secondary pointing menu">
  {# Highlight the nav tab matching the current URL.
     - Stocks tab covers / (the browser) and /stock/<symbol> (detail pages).
     - Strategies tab covers /strategies (list) and /strategy/<id> (detail).
     - Order History only matches /orders. #}
  <a href="/" class="{% if request.url.path == '/' or request.url.path.startswith('/stock/') %}active {% endif %}item">
    Stocks
  </a>
  <a href="/strategies" class="{% if request.url.path.startswith('/strateg') %}active {% endif %}item">
    Strategies
  </a>
  <a href="/orders" class="{% if request.url.path == '/orders' %}active {% endif %}item">
    Order History
  </a>
</div>
        <div class = "ui container">
            {% block content %}
            {% endblock %}
        </div>
    </body>
</html>
